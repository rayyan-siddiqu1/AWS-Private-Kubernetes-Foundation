---
# Dedicated ServiceAccount — name must match the Consul service name.
# consul-k8s-auth-method binding rule: BindName="${serviceaccount.name}"
# → SA "backend" → token scoped to Consul service "backend" → ACL login succeeds.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: test-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: test-app
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/service-port: "9090"
    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          image: hashicorp/http-echo:0.2.3
          args:
            - -listen=:9090
            - -text={"service":"backend","status":"ok","consul_connect":true}
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: test-app
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 9090
      targetPort: 9090
