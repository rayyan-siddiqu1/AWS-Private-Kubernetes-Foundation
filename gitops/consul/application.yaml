apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: consul
  namespace: argocd
  # Finalizer ensures ArgoCD cleans up child resources when the Application is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # IMPORTANT: Update repoURL to your GitHub repository URL before activating GitOps mode.
    # Example: https://github.com/your-username/aws-k8s-foundation
    repoURL: https://github.com/PLACEHOLDER/aws-k8s-foundation
    targetRevision: HEAD
    path: gitops/consul
    helm:
      releaseName: consul
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: consul
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
