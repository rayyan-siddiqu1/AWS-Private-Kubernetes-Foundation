# Consul Helm values — GitOps version
# Chart: hashicorp/consul
# This file is used by the ArgoCD Application in application.yaml.
#
# To activate GitOps mode:
#   1. Push this repo to GitHub (e.g., github.com/<user>/aws-k8s-foundation)
#   2. Update application.yaml repoURL with your GitHub URL
#   3. Set consul_gitops_mode: true in group_vars/all.yml
#   4. Run: ansible-playbook -i inventory/hosts.ini site.yml --tags consul-stack
#
# ArgoCD will then manage the Consul Helm release from this file.

global:
  name: consul
  datacenter: dc1
  acls:
    manageSystemACLs: true
  tls:
    enabled: false
  metrics:
    enabled: true
    enableAgentMetrics: true
    agentMetricsRetentionTime: 1m

server:
  replicas: 3
  storage: 10Gi
  storageClass: local-path
  tolerations: |
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: ""
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m

ui:
  enabled: true
  service:
    type: ClusterIP

connectInject:
  enabled: true
  default: false
  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m
