---
# =============================================================================
# helm/tasks/main.yml
#
# Installs Helm v3 on the control plane and adds the four Helm repositories
# required by the platform stack.
#
# Idempotency:
#   - Binary:       checks `helm version` before downloading; skips if already
#                   at the requested version.
#   - Repositories: kubernetes.core.helm_repository is idempotent by design.
# =============================================================================

# ---------------------------------------------------------------------------
# Helm binary
# ---------------------------------------------------------------------------
- name: Check installed Helm version
  command: "{{ helm_binary_path }} version --short"
  register: helm_installed_version
  changed_when: false
  failed_when: false
  # rc=0 and stdout contains version string → helm is present
  # rc=2 (not found) → helm must be installed

- name: Download Helm install script
  get_url:
    url: "{{ helm_install_script_url }}"
    dest: /tmp/get_helm.sh
    mode: '0700'
    force: false
  when: >
    helm_installed_version.rc != 0 or
    helm_version not in helm_installed_version.stdout

- name: Install Helm {{ helm_version }}
  command: "/tmp/get_helm.sh --version v{{ helm_version }}"
  when: >
    helm_installed_version.rc != 0 or
    helm_version not in helm_installed_version.stdout
  # Script installs to /usr/local/bin/helm — requires become: true (inherited from play).

# ---------------------------------------------------------------------------
# Python kubernetes library
# Required on the target host for kubernetes.core collection modules.
# ---------------------------------------------------------------------------
- name: Install python3-kubernetes
  apt:
    name: python3-kubernetes
    state: present
    update_cache: false

# ---------------------------------------------------------------------------
# Helm repositories
# Run as ubuntu (become: false) so repos are written to ubuntu's helm config
# (/home/ubuntu/.config/helm/repositories.yaml), not root's.
# ---------------------------------------------------------------------------
- name: Add Helm repositories
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
    state: present
    binary_path: "{{ helm_binary_path }}"
  loop: "{{ helm_repos }}"
  become: false

- name: Update Helm repository cache
  command: "{{ helm_binary_path }} repo update"
  become: false
  changed_when: false
