[defaults]
inventory           = inventory/hosts.ini
remote_user         = ubuntu
private_key_file    = /home/rayyan/.ssh/terraform-keypair.pem
host_key_checking   = False

# Gather facts once per run and cache them to disk for 1 hour
gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout    = 3600

retry_files_enabled = False
stdout_callback     = yaml
roles_path          = roles

# Show task execution time
callbacks_enabled   = timer, profile_tasks

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
# ControlMaster/ControlPersist: reuse SSH connections — critical for speed
# ForwardAgent: passes SSH agent through to jump host so workers can auth
ssh_args    = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o ForwardAgent=yes
pipelining  = True
