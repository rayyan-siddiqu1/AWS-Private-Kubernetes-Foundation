---
# =============================================================================
# site.yml — Kubernetes Cluster Bootstrap + Platform Stack Orchestration
#
# Execution order:
#   1. common              → all nodes   (swap, kernel modules, sysctl, packages)
#   2. container_runtime   → all nodes   (containerd + SystemdCgroup)
#   3. kubernetes_packages → all nodes   (kubelet, kubeadm, kubectl)
#   4. master              → masters     (kubeadm init, kubeconfig, join command)
#   5. worker              → workers     (kubeadm join)
#   6. cni                 → masters     (Calico manifest, wait for Ready nodes)
#   7. metrics_server      → masters     (metrics-server + insecure-tls patch)
#   8. helm                → masters     (Helm v3 binary + chart repos)
#   9. ingress_nginx       → masters     (NGINX Ingress NodePort 30080/30443)
#  10. cert_manager        → masters     (cert-manager + self-signed ClusterIssuer)
#  11. argocd              → masters     (ArgoCD GitOps platform + Ingress)
#  12. monitoring          → masters     (kube-prometheus-stack: Prometheus + Grafana)
#  13. istio               → masters     (Istio service mesh: base CRDs + istiod)
#  14. consul              → masters     (Consul: service discovery + Connect mesh)
#  15. sample_app          → masters     (Demo app: frontend + backend via Consul Connect)
#  16. consul_vm_agent     → consul_vm   (Consul agent on VMs — conditional, skipped if group empty)
#
# Run the full stack:
#   ansible-playbook -i inventory/hosts.ini site.yml
#
# Run only platform plays (cluster must already exist):
#   ansible-playbook -i inventory/hosts.ini site.yml --tags platform
#
# Run only Consul+Istio plays (platform must already exist):
#   ansible-playbook -i inventory/hosts.ini site.yml --tags consul-stack
#
# Prerequisites for platform plays (8-16):
#   ansible-galaxy collection install -r requirements.yml
# =============================================================================

# ---------------------------------------------------------------------------
# Play 1: Common system hardening — all nodes
# ---------------------------------------------------------------------------
- name: Apply common system configuration to all cluster nodes
  hosts: k8s_cluster
  become: true
  gather_facts: true
  roles:
    - common
    - container_runtime
    - kubernetes_packages

# ---------------------------------------------------------------------------
# Play 2: Bootstrap Kubernetes control plane
# ---------------------------------------------------------------------------
- name: Initialize Kubernetes control plane
  hosts: masters
  become: true
  gather_facts: true
  roles:
    - master

# ---------------------------------------------------------------------------
# Play 3: Join worker nodes
# ---------------------------------------------------------------------------
- name: Join worker nodes to the cluster
  hosts: workers
  become: true
  gather_facts: true
  roles:
    - worker

# ---------------------------------------------------------------------------
# Play 4: Install Calico CNI — run from control plane
# ---------------------------------------------------------------------------
- name: Install Calico CNI and wait for nodes to be Ready
  hosts: masters
  become: true
  gather_facts: false
  roles:
    - cni

# ---------------------------------------------------------------------------
# Play 5: Install Metrics Server — run from control plane
# ---------------------------------------------------------------------------
- name: Install and patch Metrics Server
  hosts: masters
  become: true
  gather_facts: false
  roles:
    - metrics_server

# ---------------------------------------------------------------------------
# Play 6: Install Helm on the control plane
# ---------------------------------------------------------------------------
- name: Install Helm and configure repositories
  hosts: masters
  become: true
  gather_facts: false
  tags: platform
  roles:
    - helm

# ---------------------------------------------------------------------------
# Play 7: Install NGINX Ingress Controller
# ---------------------------------------------------------------------------
- name: Install NGINX Ingress Controller (NodePort 30080/30443)
  hosts: masters
  become: true
  gather_facts: false
  tags: platform
  roles:
    - ingress_nginx

# ---------------------------------------------------------------------------
# Play 8: Install cert-manager and configure self-signed ClusterIssuer
# ---------------------------------------------------------------------------
- name: Install cert-manager and configure self-signed ClusterIssuer
  hosts: masters
  become: true
  gather_facts: false
  tags: platform
  roles:
    - cert_manager

# ---------------------------------------------------------------------------
# Play 9: Install ArgoCD GitOps platform
# ---------------------------------------------------------------------------
- name: Install ArgoCD
  hosts: masters
  become: true
  gather_facts: false
  tags: platform
  roles:
    - argocd

# ---------------------------------------------------------------------------
# Play 10: Install kube-prometheus-stack (Prometheus + Grafana)
# ---------------------------------------------------------------------------
- name: Install kube-prometheus-stack
  hosts: masters
  become: true
  gather_facts: false
  tags: platform
  roles:
    - monitoring

# ---------------------------------------------------------------------------
# Play 11: Install Istio service mesh
# ---------------------------------------------------------------------------
- name: Install Istio service mesh (base CRDs + istiod)
  hosts: masters
  become: true
  gather_facts: false
  tags:
    - platform
    - consul-stack
  roles:
    - istio

# ---------------------------------------------------------------------------
# Play 12: Install Consul (service discovery + Connect service mesh)
# ---------------------------------------------------------------------------
- name: Install Consul
  hosts: masters
  become: true
  gather_facts: false
  tags:
    - platform
    - consul-stack
  roles:
    - consul

# ---------------------------------------------------------------------------
# Play 13: Deploy Consul Connect sample application
# ---------------------------------------------------------------------------
- name: Deploy sample application (Consul Connect demo)
  hosts: masters
  become: true
  gather_facts: false
  tags:
    - platform
    - consul-stack
  roles:
    - sample_app

# ---------------------------------------------------------------------------
# Play 14: Install Consul agent on VM nodes (conditional)
# Only runs if the [consul_vm] group has hosts in the inventory.
# ---------------------------------------------------------------------------
- name: Install Consul agent on VM nodes
  hosts: consul_vm
  become: true
  gather_facts: true
  tags:
    - consul-stack
    - consul-vm
  roles:
    - consul_vm_agent
