# =============================================================================
# Static Inventory — AWS EC2 Kubernetes Cluster
#
# Replace placeholder IPs with real values from Terraform outputs:
#   terraform -chdir=terraform/environments/dev output control_plane_public_ip
#   terraform -chdir=terraform/environments/dev output worker_private_ips
#
# Dynamic inventory integration:
#   See README for how to replace this with a Terraform-backed dynamic inventory.
# =============================================================================

[masters]
control-plane ansible_host=13.234.232.7 ansible_user=ubuntu

[workers]
worker1 ansible_host=10.0.2.176 ansible_user=ubuntu
worker2 ansible_host=10.0.2.125 ansible_user=ubuntu

# k8s_cluster groups masters + workers so Play 1 targets all nodes
[k8s_cluster:children]
masters
workers

# consul_vm: VM/bare-metal hosts that run the Consul client agent (Play 14).
# Leave empty to skip Play 14 entirely — the play uses "hosts: consul_vm"
# and Ansible skips plays with no matching hosts automatically.
#
# To add a VM:
#   legacy-vm ansible_host=<IP> ansible_user=ubuntu
#
# Ensure the host can reach the control plane on Consul gossip ports (8301).
[consul_vm]
