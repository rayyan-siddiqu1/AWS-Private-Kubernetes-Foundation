---
# =============================================================================
# group_vars/all.yml — Variables applied to every host in the inventory
# =============================================================================

# ---------------------------------------------------------------------------
# Kubernetes
# ---------------------------------------------------------------------------
# Minor version only — patch is resolved by the apt repository
kubernetes_version: "1.32"

# Path where the Kubernetes apt GPG keyring is stored
kubernetes_apt_keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

# Pod CIDR — must match --pod-network-cidr in kubeadm init and Calico's default
pod_network_cidr: "192.168.0.0/16"

# ---------------------------------------------------------------------------
# Containerd
# ---------------------------------------------------------------------------
containerd_config_path: /etc/containerd/config.toml

# ---------------------------------------------------------------------------
# Calico CNI
# ---------------------------------------------------------------------------
calico_version: "v3.29.1"
calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/v3.29.1/manifests/calico.yaml"

# ---------------------------------------------------------------------------
# Metrics Server
# ---------------------------------------------------------------------------
# Pinning to latest avoids breakage on unexpected manifest changes.
# Replace with a specific version tag for stricter reproducibility.
metrics_server_manifest_url: "https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml"

# ---------------------------------------------------------------------------
# Join command
# ---------------------------------------------------------------------------
# File on the master that stores the kubeadm join command for workers to consume
join_command_file: /tmp/kubeadm_join_command.sh

# ---------------------------------------------------------------------------
# Platform stack — ingress base domain
# ---------------------------------------------------------------------------
# nip.io resolves <ip>.nip.io to <ip>. Provides free wildcard DNS for lab
# ingress hostnames without requiring a registered domain or Route 53.
# Constructed at runtime from the master's public IP in the inventory.
ingress_base_domain: "{{ hostvars[groups['masters'][0]]['ansible_host'] }}.nip.io"

# ---------------------------------------------------------------------------
# Helm
# ---------------------------------------------------------------------------
helm_version: "3.17.0"
helm_binary_path: /usr/local/bin/helm

helm_repos:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: jetstack
    url: https://charts.jetstack.io
  - name: argo
    url: https://argoproj.github.io/argo-helm
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

# ---------------------------------------------------------------------------
# NGINX Ingress Controller
# ---------------------------------------------------------------------------
ingress_nginx_chart_version: "4.11.3"
ingress_nginx_namespace: ingress-nginx
ingress_nginx_release_name: ingress-nginx
ingress_nginx_http_nodeport: 30080
ingress_nginx_https_nodeport: 30443

# ---------------------------------------------------------------------------
# cert-manager
# ---------------------------------------------------------------------------
cert_manager_chart_version: "v1.16.2"
cert_manager_namespace: cert-manager
cert_manager_release_name: cert-manager
# Name of the ClusterIssuer referenced by all Ingress TLS annotations.
cert_manager_cluster_issuer_name: selfsigned-issuer

# ---------------------------------------------------------------------------
# ArgoCD
# ---------------------------------------------------------------------------
argocd_chart_version: "7.7.3"
argocd_namespace: argocd
argocd_release_name: argocd
argocd_hostname: "argocd.{{ ingress_base_domain }}"

# ---------------------------------------------------------------------------
# Monitoring — kube-prometheus-stack (Prometheus + Grafana)
# ---------------------------------------------------------------------------
kube_prometheus_stack_chart_version: "67.9.0"
monitoring_namespace: monitoring
monitoring_release_name: kube-prometheus-stack
grafana_hostname: "grafana.{{ ingress_base_domain }}"
# Change this before deploying to a non-lab environment.
grafana_admin_password: "prom-operator"
